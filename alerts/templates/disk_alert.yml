name: "High Disk Usage"
description: "Alert when disk usage exceeds threshold"
type: "static"
enabled: true

# Query for disk usage
nrql: "SELECT average(diskUsedPercent) FROM StorageSample WHERE entity.name = '{{ app_name }}'"

# Alert conditions
critical:
  operator: "above"
  threshold: 90
  duration: 300  # 5 minutes
  
warning:
  operator: "above"
  threshold: 75
  duration: 600  # 10 minutes

# Additional configuration
aggregation_window: 300
aggregation_method: "average"
close_violations_on_recovery: true
